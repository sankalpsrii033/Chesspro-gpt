<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess — ELO Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>♟ ELO ARENA</h1>
  <p>Challenge any strength — 400 to 3200</p>
</header>

<div class="game-container">

  <div class="elo-panel">
    <h2>⚙ Opponent</h2>
    <div class="elo-display" id="elo-num">1200</div>
    <div class="elo-title" id="elo-title" style="color:#aaa88a">Intermediate</div>
    <input type="range" id="elo-slider" min="400" max="3200" value="1200" step="50">
    <div class="elo-labels"><span>400</span><span>3200</span></div>
    <div class="presets">
      <button class="preset-btn" onclick="setElo(400)"><span>🟢 Beginner</span><span>400</span></button>
      <button class="preset-btn" onclick="setElo(800)"><span>🟡 Casual</span><span>800</span></button>
      <button class="preset-btn" onclick="setElo(1200)"><span>🟠 Club</span><span>1200</span></button>
      <button class="preset-btn" onclick="setElo(1600)"><span>🔴 Expert</span><span>1600</span></button>
      <button class="preset-btn" onclick="setElo(2000)"><span>🟣 Master</span><span>2000</span></button>
      <button class="preset-btn" onclick="setElo(2500)"><span>⚫ GM</span><span>2500</span></button>
      <button class="preset-btn" onclick="setElo(3200)"><span>💠 Magnus</span><span>3200</span></button>
    </div>
    <button class="btn-start" onclick="startGame()">▶ New Game</button>
  </div>

  <div class="board-wrap">
    <div class="captured-row" id="cap-black"></div>
    <div class="board-coords-top" id="files-top"></div>
    <div id="board-rows"></div>
    <div class="board-coords-bottom" id="files-bot"></div>
    <div class="captured-row" id="cap-white"></div>
    <div class="thinking-bar"><div class="thinking-fill" id="think-bar"></div></div>
  </div>

  <div class="status-panel">
    <h2>📋 Game</h2>
    <div class="turn-indicator">
      <div class="turn-dot" id="turn-dot" style="background:#eee; border-color:#eee"></div>
      <span id="turn-text">White to move</span>
    </div>
    <div id="game-status">Start a new game!</div>
    <br>
    <div style="font-size:0.65rem;color:#555;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;">Move History</div>
    <div class="move-list" id="move-list"></div>
  </div>

</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Game Over</h2>
    <p id="modal-msg">The game has ended.</p>
    <button class="btn-start" onclick="closeModal();startGame()">▶ Play Again</button>
  </div>
</div>

<script src="chess.js"></script>
</body>
</html>
